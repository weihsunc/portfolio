<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wei-Hsun Chen — Enter Password</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />

  <!-- Prevent theme flash -->
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>

  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }

    .pw-header {
      display: flex;
      justify-content: flex-end;
      padding: 32px 40px;
    }

    .pw-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 40px 80px;
      gap: 16px;
    }

    .pw-label {
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 400;
      color: var(--foreground);
    }

    .pw-form {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 14px;
      border: none;
      padding: 6px;
      width: 280px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.3s ease;
      box-shadow: none;
    }

    /* Gradient flash overlay — same as chatbot trigger */
    .pw-form::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(223, 58, 88, 0.15) 15%,
        rgba(244, 136, 74, 0.15) 35%,
        rgba(252, 195, 92, 0.15) 55%,
        rgba(74, 141, 168, 0.12) 80%,
        transparent 100%
      );
      background-size: 200% 100%;
      background-position: -100% 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 1;
    }
    .pw-form:hover::before {
      opacity: 1;
      animation: gradientFlash 0.8s ease-out forwards;
    }
    .pw-form:hover {
      transform: translateY(-1px);
      box-shadow: none;
    }

    @keyframes gradientFlash {
      from { background-position: -100% 0; }
      to   { background-position: 100% 0; }
    }

    /* Success — progress bar at top of page */
    .pw-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      width: 100%;
      z-index: 9999;
      pointer-events: none;
    }
    .pw-progress-bar {
      height: 100%;
      width: 100%;
      background: #2563EB;
      transform: scaleX(0);
      transform-origin: left center;
    }
    .pw-progress-bar.active {
      animation: progressFill 1400ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes progressFill {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    .pw-input {
      flex: 1;
      font-family: var(--font-sans);
      font-size: 16px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.9);
      background: transparent;
      border: none;
      padding: 8px 8px 8px 10px;
      outline: none;
      min-width: 0;
      position: relative;
      z-index: 2;
    }
    .pw-input::placeholder {
      color: rgba(0, 0, 0, 0.35);
      font-weight: 500;
    }

    .pw-submit {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: #171717;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: opacity 150ms ease;
    }
    .pw-submit:hover { opacity: 0.8; }
    .pw-submit svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pw-form:hover .pw-submit svg {
      transform: rotate(90deg);
    }

    .pw-error {
      font-family: var(--font-sans);
      font-size: 14px;
      color: #ef4444;
      height: 20px;
      opacity: 0;
      transition: opacity 200ms ease;
    }
    .pw-error.visible { opacity: 1; }

    .pw-shake { animation: shake 400ms ease; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(4px); }
    }

    /* Light mode — invert the input box to dark */
    [data-theme="light"] .pw-form {
      background: rgba(23, 23, 23, 0.88);
      box-shadow: none;
    }
    [data-theme="light"] .pw-form::before {
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(223, 58, 88, 0.25) 15%,
        rgba(244, 136, 74, 0.25) 35%,
        rgba(252, 195, 92, 0.25) 55%,
        rgba(74, 141, 168, 0.2) 80%,
        transparent 100%
      );
      background-size: 200% 100%;
      background-position: -100% 0;
    }
    [data-theme="light"] .pw-form:hover {
      background: rgba(23, 23, 23, 0.95);
      box-shadow: none;
    }
    [data-theme="light"] .pw-input {
      color: rgba(255, 255, 255, 0.95);
    }
    [data-theme="light"] .pw-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }
    [data-theme="light"] .pw-submit {
      background: #fff;
      color: #171717;
    }

    /* Fade out page on success */
    .pw-fade-out {
      animation: fadeOut 400ms ease forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; }
    }

    /* Tunnel canvas */
    #tunnelCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .pw-header, .pw-center { position: relative; z-index: 1; }

    @media (max-width: 480px) {
      .pw-header { padding: 24px 20px; }
      .pw-center { padding: 0 20px 60px; }
      .pw-form { width: 100%; max-width: 280px; }
    }
  </style>
</head>
<body>

  <canvas id="tunnelCanvas"></canvas>

  <div class="pw-progress"><div class="pw-progress-bar" id="pwProgress"></div></div>

  <div class="pw-header">
    <button class="btn-ghost" onclick="toggleTheme()" aria-label="Toggle theme">
      <span class="theme-icon">◑</span>
    </button>
  </div>

  <div class="pw-center">
    <span class="pw-label">Enter password</span>
    <form class="pw-form" id="pwForm" autocomplete="off">
      <input class="pw-input" id="pwInput" type="password" placeholder="Password" autofocus />
      <button class="pw-submit" type="submit" aria-label="Enter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 17L17 7"/><path d="M7 7h10v10"/>
        </svg>
      </button>
    </form>
    <span class="pw-error" id="pwError">Incorrect password</span>
  </div>

  <!-- 3D Dot Tunnel Effect -->
  <script>
    (function () {
      var canvas = document.getElementById('tunnelCanvas');
      var ctx = canvas.getContext('2d');
      var w, h, cx, cy;
      var speed = 0.00005;
      var time = 0;
      var numRings = 23;
      var dotsPerRing = 18;

      function resize() {
        var dpr = window.devicePixelRatio || 1;
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cx = w / 2;
        cy = h / 2;
      }

      function isDark() {
        return document.documentElement.getAttribute('data-theme') !== 'light';
      }

      function draw(ts) {
        time = ts * speed;
        ctx.clearRect(0, 0, w, h);

        var dark = isDark();
        var dotColor = dark ? 'rgba(255, 255, 255,' : 'rgba(0, 0, 0,';
        var maxR = Math.max(w, h) * 0.85;

        for (var r = 0; r < numRings; r++) {
          var phase = (r / numRings + time * 0.4) % 1;
          var radius = phase * phase * maxR;

          if (radius < 3) continue;

          var dotSize = 0.8 + phase * 2.2;

          // More transparent near center, stronger toward edges
          var alpha = phase * phase * 0.14;
          if (alpha < 0.005) continue;

          for (var d = 0; d < dotsPerRing; d++) {
            var a = (Math.PI * 2 / dotsPerRing) * d;

            var x = cx + Math.cos(a) * radius;
            var y = cy + Math.sin(a) * radius;

            ctx.beginPath();
            ctx.arc(x, y, dotSize, 0, Math.PI * 2);
            ctx.fillStyle = dotColor + alpha.toFixed(3) + ')';
            ctx.fill();
          }
        }

        // Center vanishing point dot
        ctx.beginPath();
        ctx.arc(cx, cy, 2, 0, Math.PI * 2);
        ctx.fillStyle = dotColor + '0.15)';
        ctx.fill();

        requestAnimationFrame(draw);
      }

      resize();
      window.addEventListener('resize', resize);
      requestAnimationFrame(draw);
    })();
  </script>

  <script src="shared.js"></script>
  <script>
    (function () {
      var form = document.getElementById('pwForm');
      var input = document.getElementById('pwInput');
      var error = document.getElementById('pwError');
      var progress = document.getElementById('pwProgress');

      function showError() {
        error.classList.add('visible');
        form.classList.remove('pw-shake');
        void form.offsetWidth;
        form.classList.add('pw-shake');
        input.select();
        setTimeout(function () {
          error.classList.remove('visible');
        }, 2000);
      }

      function onSuccess() {
        sessionStorage.setItem('pw_ok', '1');
        input.disabled = true;
        progress.classList.add('active');
        setTimeout(function () {
          document.body.classList.add('pw-fade-out');
          setTimeout(function () {
            window.location.href = 'index.html';
          }, 400);
        }, 1500);
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var pw = input.value.trim();
        if (!pw) return;

        fetch('/api/verify-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data.valid) {
            onSuccess();
          } else {
            showError();
          }
        })
        .catch(function () {
          // Fallback: if API is unreachable, show error
          showError();
        });
      });
    })();
  </script>

</body>
</html>
